<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SchoolWallet</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <h1 class="app-title">SchoolWallet</h1>
                <p class="app-subtitle">Reset Your Password</p>
            </div>

            <div id="emailStep">
                <p style="color: var(--text-light); margin-bottom: 20px;">Enter your email address and we'll send you a link to reset your password.</p>
                <form id="emailForm" class="login-form">
                    <div class="form-group">
                        <label for="resetEmail">Email Address:</label>
                        <input type="email" id="resetEmail" placeholder="your.email@example.com" required>
                    </div>
                    <button type="submit" class="btn-login">Send Reset Link</button>
                </form>
            </div>

            <div id="resetStep" style="display: none;">
                <p style="color: var(--text-light); margin-bottom: 20px;">Enter your new password below.</p>
                <form id="resetForm" class="login-form">
                    <div class="form-group">
                        <label for="newPassword">New Password:</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">Confirm Password:</label>
                        <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn-login">Reset Password</button>
                </form>
            </div>

            <div class="auth-links" style="margin-top: 20px;">
                <a href="../index.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // Handle email submission
        document.getElementById('emailForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            
            const result = await authManager.resetPassword(email);
            
            if (result.success) {
                showAlert(result.message, 'success');
                // In a real app, after verification, show reset form
                // For now, just show the reset form
                setTimeout(() => {
                    document.getElementById('emailStep').style.display = 'none';
                    document.getElementById('resetStep').style.display = 'block';
                }, 1000);
            } else {
                showAlert(result.message || 'Failed to send reset link', 'error');
            }
        });

        // Handle password reset
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }
            
            showAlert('Password reset successfully! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 2000);
        });
    </script>
</body>
</html>
